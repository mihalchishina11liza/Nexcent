<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexcent</title>
  </head>
  <body>
    <header>
      <img src="./images/Logo.svg" alt="nexcent logo" />
      <nav>
        <ul>
          <li>Home</li>
          <li>Service</li>
          <li>Feature</li>
          <li>Product</li>
          <li>Testimonial</li>
          <li>FAQ</li>
        </ul>
      </nav>
      <button>Login</button>
      <button>Sign up</button>

    <section class="hero-section">
      <h1>Lessons and insights from 8 years</h1>
      <p>
        Where to grow your business as a photographer: site or social media?
      </p>
      <button>Register</button>
      <img
        src="./images/hero-section-illustration.png"
        alt="man wiht a laptop"
      />

    <section class="clients-section">
      <h2>Our Clients</h2>
      <p>We have been working with some Fortune 500+ clients</p>
      <img src="./images/client-logo-1.svg" alt="client-logo-1" />
      <img src="./images/client-logo-2.svg" alt="client-logo-2" />
      <img src="./images/client-logo-3-7.svg" alt="client-logo-3" />
      <img src="./images/client-logo-4.svg" alt="client-logo-4" />
      <img src="./images/client-logo-5.svg" alt="client-logo-5" />
      <img src="./images/client-logo-6.svg" alt="client-logo-6" />
      <img src="./images/client-logo-3-7.svg" alt="client-logo-7" />
    </section>
